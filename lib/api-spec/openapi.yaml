openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: openai
    description: OpenAI-backed report generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /openai/generate-report:
    post:
      operationId: generateReportWithAI
      tags: [openai]
      summary: Generate a civic biodiversity report narrative with OpenAI
      description: |
        Takes a structured report context (type, area, group, top species and
        observation counts) and returns AI-generated narrative sections:
        executive summary, key finding, why-it-matters paragraph, three short
        bullet highlights, and four recommended actions. Falls back to safe,
        non-alarmist language. Disclaimer wording is kept on the client.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateReportRequest"
      responses:
        "200":
          description: AI-generated report sections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateReportResponse"
        "400":
          description: Invalid request body
        "500":
          description: AI provider error
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    GenerateReportSpecies:
      type: object
      properties:
        commonName:
          type: string
          maxLength: 120
        scientificName:
          type: string
          maxLength: 120
        group:
          type: string
          maxLength: 80
        role:
          type: string
          maxLength: 80
        recentCount:
          type: integer
          minimum: 0
          maximum: 1000000
        conservation:
          type: string
          maxLength: 80
      required:
        - commonName
        - scientificName
        - recentCount
    GenerateReportRequest:
      type: object
      properties:
        type:
          type: string
          enum:
            - species_concern
            - biodiversity_change
            - pollinator_decline
            - invasive_watch
            - area_summary
        city:
          type: string
          maxLength: 120
        radiusKm:
          type: number
          minimum: 0
          maximum: 500
        group:
          type: string
          maxLength: 80
        recentObservations:
          type: integer
          minimum: 0
          maximum: 10000000
        historicalObservations:
          type: integer
          minimum: 0
          maximum: 10000000
        uniqueSpecies:
          type: integer
          minimum: 0
          maximum: 10000000
        focusSpecies:
          $ref: "#/components/schemas/GenerateReportSpecies"
        topSpecies:
          type: array
          maxItems: 5
          items:
            $ref: "#/components/schemas/GenerateReportSpecies"
      required:
        - type
        - city
        - radiusKm
        - group
        - recentObservations
        - historicalObservations
        - uniqueSpecies
        - topSpecies
    GenerateReportResponse:
      type: object
      properties:
        title:
          type: string
        executiveSummary:
          type: string
        keyFinding:
          type: string
        whyItMatters:
          type: string
        bullets:
          type: array
          items:
            type: string
        recommendations:
          type: array
          items:
            type: string
      required:
        - title
        - executiveSummary
        - keyFinding
        - whyItMatters
        - bullets
        - recommendations
