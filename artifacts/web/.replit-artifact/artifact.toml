kind = "web"
previewPath = "/explore/"
title = "Natura Web"
version = "1.0.0"

[[services]]
localPort = 5173
name = "web"
paths = ["/explore/"]
serve = "static"
publicDir = "dist"

[services.development]
run = "pnpm --filter @workspace/web run dev"

[services.production]
build = ["pnpm", "--filter", "@workspace/web", "run", "build"]

[services.env]
PORT = "5173"
BASE_PATH = "/explore/"
