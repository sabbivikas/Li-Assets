kind = "web"
previewPath = "/explore/"
title = "Natura Web"
version = "1.0.0"

[[services]]
localPort = 5173
name = "web"
paths = ["/explore/"]

[services.development]
run = "pnpm --filter @workspace/web run dev"

[services.production]
build = ["pnpm", "--filter", "@workspace/web", "run", "build"]
run = "pnpm --filter @workspace/web run serve"

[services.env]
PORT = "5173"
BASE_PATH = "/explore/"
